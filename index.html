    function Timer({ seconds: initSec, color, onDone }) {
      const [left, setLeft] = useState(initSec);
      const [running, setRunning] = useState(false);
      const ref = useRef(null);

      useEffect(() => { setLeft(initSec); setRunning(false); }, [initSec]);

      useEffect(() => {
        if (!running || left <= 0) return;
        ref.current = setTimeout(() => setLeft(l => l - 1), 1000);
        return () => clearTimeout(ref.current);
      }, [running, left]);

      useEffect(() => {
        if (left === 0 && running) {
          setRunning(false);
          onDone?.();
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
      }, [left, running]);

      const pct = initSec > 0 ? left / initSec : 0;
      const r = 22, circ = 2 * Math.PI * r;

      return (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 10 }}>
          <div style={{ position: "relative", width: 52, height: 52, flexShrink: 0 }}>
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r={r} fill="none" stroke="#2A2A2E" strokeWidth="4"/>
              <circle cx="26" cy="26" r={r} fill="none" stroke={color} strokeWidth="4"
                strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
                strokeLinecap="round" transform="rotate(-90 26 26)"
                style={{ transition: "stroke-dashoffset 0.3s" }}/>
            </svg>
            <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "'Outfit',sans-serif", fontWeight: 600, fontSize: 15, color: "#F5F5F5" }}>
              {left}
            </span>
          </div>
          <button onClick={() => setRunning(r => !r)}
            style={{ padding: "6px 16px", borderRadius: 8, border: "none", background: running ? "#2A2A2E" : color,
              color: "#fff", fontFamily: "'Outfit',sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer",
              transition: "background 0.2s" }}>
            {running ? "Pausa" : left < initSec && left > 0 ? "Riprendi" : "Avvia"}
          </button>
          {left < initSec && (
            <button onClick={() => { setLeft(initSec); setRunning(false); }}
              style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #2A2A2E", background: "transparent",
                color: "#8B8B8E", fontSize: 12, cursor: "pointer", fontFamily: "'Outfit',sans-serif" }}>
              Reset
            </button>
          )}
        </div>
      );
    }

                <p style={{ fontSize: 12, color: "#F59E0B", marginTop: 8, fontWeight: 500 }}>⟳ {ex.alt}</p>
              )}
              {ex.rest && <Timer seconds={ex.rest} color={color} />}
            </div>
          )}
        </div>
      );
    }

    function DayView({ dayKey, completions, setCompletions }) {
      const exercises = EXERCISES[dayKey];
      const color = COLORS[dayKey];

      const toggle = useCallback((i) => {
        if (navigator.vibrate) navigator.vibrate(40);
        
        setCompletions(c => {
          const k = dayKey;
          const s = new Set(c[k] || []);
          s.has(i) ? s.delete(i) : s.add(i);
          return { ...c, [k]: s };
        });
      }, [dayKey, setCompletions]);

      const exCount = exercises.filter(e => e.name && !e.circuit).length;
      const doneCount = (completions[dayKey] || new Set()).size;
      const isAllDone = doneCount === exCount && exCount > 0;

      return (
        <div style={{ paddingBottom: 20 }}>
          <div style={{ padding: "24px 20px 16px", background: `linear-gradient(135deg, ${color}18 0%, transparent 100%)` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <div style={{ width: 42, height: 42, borderRadius: 12, background: color,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "'Outfit',sans-serif", fontWeight: 700, fontSize: 18, color: "#fff" }}>
                {dayKey === "H" ? "🏠" : dayKey}
              </div>
              <div>
                <h2 style={{ fontSize: 18, fontWeight: 700, color: "#F5F5F5", fontFamily: "'Outfit',sans-serif", margin: 0 }}>
                  {DAY_NAMES[dayKey]}
                </h2>
                <p style={{ fontSize: 12, color: "#8B8B8E", margin: 0 }}>{DAY_SUBS[dayKey]}</p>
              </div>
            </div>

            {exCount > 0 && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 12, color: "#8B8B8E", fontWeight: 600 }}>{doneCount} su {exCount} completati</span>
                </div>
                <div style={{ height: 6, borderRadius: 3, background: "#222225", overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 3, background: color, width: `${(doneCount/exCount)*100}%`, transition: "width 0.5s cubic-bezier(0.4, 0, 0.2, 1)" }}/>
                </div>
                
                {isAllDone && (
                   <div style={{
                      marginTop: 14, padding: "10px 14px", background: `${color}22`, 
                      border: `1px solid ${color}55`, borderRadius: 10, display: "flex", 
                      alignItems: "center", gap: 10, animation: "popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)"
                   }}>
                      <span style={{ fontSize: 24 }}>🔥</span>
                      <div>
                        <h4 style={{ margin: 0, fontSize: 14, color: "#fff", fontFamily: "'Outfit',sans-serif" }}>Allenamento Distrutto!</h4>
                        <p style={{ margin: 0, fontSize: 12, color: "#AAA" }}>Ottimo lavoro, goditi il meritato riposo.</p>
                      </div>
                   </div>
                )}
                <style>
                  {`@keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }`}
                </style>
              </div>
            )}
          </div>

          <div style={{ padding: "0 12px" }}>
            {exercises.map((ex, i) => {
              if (ex.phase) {
                if (ex.stretch) {
                  return (
                    <div key={i}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "20px 4px 12px", color: "#8B8B8E",
                        fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>
                        <span>🧘 {ex.phase}</span>
                        <div style={{ flex: 1, height: 1, background: "#222225" }}/>
                      </div>
                      <div style={{ background: "#111113", borderRadius: 12, padding: "14px 16px", border: "1px dashed #2A2A2E", marginBottom: 8 }}>
                        {ex.items?.map((item, j) => (
                          <p key={j} style={{ fontSize: 13, color: "#9B9B9E", padding: "4px 0 4px 16px", position: "relative", lineHeight: 1.5, margin: 0 }}>
                            <span style={{ position: "absolute", left: 0, color }}>•</span>
                            <span dangerouslySetInnerHTML={{ __html: item.replace(/^([^:]+:)/, '<strong style="color:#DDDDE0">$1</strong>') }}/>
                          </p>
                        ))}
                      </div>
                    </div>
                  );
                }
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, margin: "24px 4px 12px" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#8B8B8E" }}>{ex.phase}</span>
                    <div style={{ flex: 1, height: 1, background: "#222225" }}/>
                    {ex.circuit && ex.circuitNote && null}
                  </div>
                );
              }
              if (ex.circuit && !ex.name) return null;
              if (ex.circuit) {
                return (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: 12,
                    background: "#111113", borderRadius: 10, padding: "12px 14px", marginBottom: 8,
                    border: "1px solid #1A1A1E",
                  }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: color,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontFamily: "monospace", fontSize: 13, fontWeight: 600, color: "#fff", flexShrink: 0 }}>
                      {exercises.filter((e2, j) => j < i && e2.circuit && e2.name).length + 1}
                    </div>
                    {IMAGES[ex.icon] && <img src={IMAGES[ex.icon]} alt={ex.name} style={{ width: 40, height: 40, flexShrink: 0, borderRadius: 8, objectFit: "cover" }}/>}
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#E5E5E5" }}>{ex.name}</div>
                      <div style={{ fontSize: 12, color: "#8B8B8E", marginTop: 2 }}>{ex.desc?.slice(0, 80)}…</div>
                    </div>
                  </div>
                );
              }
              const exIdx = exercises.filter((e2, j) => j <= i && e2.name && !e2.circuit).length - 1;
              return <ExerciseCard key={i} ex={ex} color={color} done={(completions[dayKey] || new Set()).has(exIdx)} onToggle={() => toggle(exIdx)} />;
            })}
            {exercises.some(e => e.circuitNote) && (
              <div style={{ background: "#161618", borderLeft: `3px solid ${color}`, padding: "10px 14px", borderRadius: "0 8px 8px 0", marginTop: 12 }}>
                <p style={{ fontSize: 13, color: "#8B8B8E", margin: 0, lineHeight: 1.5 }}>
                  <strong style={{ color: "#E5E5E5" }}>Formato Circuito: </strong>
                  {exercises.find(e => e.circuitNote)?.circuitNote}
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    function TipsView() {
      const tips = [
        { icon: "🎒", title: "Palestra affollata", items: [
          "I manubri si liberano prima delle macchine — la scheda è costruita apposta",
          "Se la panca è occupata → push-up. Vogatore preso → ellittica. Non aspettare mai",
          "Fai superset (es. rematore + chest press senza pausa) per risparmiare tempo",
        ]},
        { icon: "🪑", title: "Postura fuori palestra", items: [
          "Chin tuck ogni ora: metti un timer. 5 rep, 5s tenuta. 30 secondi che cambiano tutto",
          "Monitor all'altezza degli occhi, gomiti a 90° sulla tastiera",
          "Chitarra: ogni 20-30 min fermati, 5 chin tuck + apri il petto",
          "Stretching nel vano porta: mani sugli stipiti, passo avanti, 10 secondi",
        ]},
        { icon: "❤️", title: "Benefici del cardio", items: [
          "150 min/settimana di attività moderata sono la raccomandazione standard",
          "Con questa scheda ci arrivi: rowing + ellittica nei giorni A/C + endurance giorno B",
          "L'HDL (colesterolo buono) beneficia dell'esercizio aerobico regolare",
        ]},
        { icon: "🥾", title: "Preparazione Cammino", items: [
          "Le gambe del giorno B simulano direttamente i movimenti del Cammino con zaino",
          "I calf raise sono il muscolo chiave per le discese — non saltarli mai",
          "L'endurance progressiva (da 12 a 25 min) costruisce la base aerobica",
          "Lo zaino caricato nella routine casa ti abitua al peso sulla schiena",
        ]},
      ];

      return (
        <div style={{ padding: "20px 12px" }}>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: "#F5F5F5", fontFamily: "'Outfit',sans-serif", margin: "0 6px 20px" }}>
            Consigli & Progressione
          </h2>
          <div style={{ background: "#161618", borderRadius: 16, border: "1px solid #222225", padding: "16px", marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#F5F5F5", fontFamily: "'Outfit',sans-serif", margin: "0 0 16px" }}>
              📈 Progressione 12 settimane
            </h3>
            {WEEKS.map((w, i) => (
              <div key={i} style={{ padding: "12px 0", borderTop: i > 0 ? "1px solid #222225" : "none" }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, fontFamily: "'JetBrains Mono',monospace", color: "#3B82F6", fontWeight: 600 }}>{w.label}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#F5F5F5", textTransform: "uppercase", letterSpacing: 0.5,
                    background: "#222225", padding: "3px 8px", borderRadius: 6 }}>{w.phase}</span>
                </div>
                <p style={{ fontSize: 13, color: "#9B9B9E", margin: 0, lineHeight: 1.6 }}>{w.note}</p>
              </div>
            ))}
          </div>
          {tips.map((t, i) => (
            <div key={i} style={{ background: "#161618", borderRadius: 16, border: "1px solid #222225", padding: "16px", marginBottom: 12 }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, color: "#F5F5F5", fontFamily: "'Outfit',sans-serif", margin: "0 0 12px" }}>
                {t.icon} {t.title}
              </h3>
              {t.items.map((item, j) => (
                <p key={j} style={{ fontSize: 13, color: "#9B9B9E", padding: "4px 0 4px 20px", position: "relative", lineHeight: 1.5, margin: 0 }}>
                  <span style={{ position: "absolute", left: 0, color: "#3B82F6", fontWeight: 600 }}>→</span>
                  {item}
                </p>
              ))}
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("A");
      
      const [completions, setCompletions] = useState(() => {
        try {
          const saved = localStorage.getItem("trainingApp_completions");
          if (saved) {
            const parsed = JSON.parse(saved);
            const hydrated = {};
            for (const [k, v] of Object.entries(parsed)) hydrated[k] = new Set(v);
            return hydrated;
          }
        } catch(e) {}
        return {};
      });

      useEffect(() => {
        const storable = {};
        for (const [k, v] of Object.entries(completions)) storable[k] = Array.from(v);
        localStorage.setItem("trainingApp_completions", JSON.stringify(storable));
      }, [completions]);

      const tabs = [
        { key: "A", label: "A", color: COLORS.A },
        { key: "B", label: "B", color: COLORS.B },
        { key: "C", label: "C", color: COLORS.C },
        { key: "H", label: "🏠", color: COLORS.H },
        { key: "tips", label: "💡", color: "#8B8B8E" },
      ];

      const resetDay = () => {
        if(window.confirm("Sei sicuro di voler azzerare le spunte di questa scheda?")) {
          setCompletions(c => ({ ...c, [tab]: new Set() }));
        }
      };

      return (
        <div style={{ fontFamily: "'DM Sans',-apple-system,sans-serif", background: "#0A0A0B", color: "#F5F5F5",
          minHeight: "100vh", maxWidth: 500, margin: "0 auto", position: "relative", paddingBottom: 85,
          WebkitFontSmoothing: "antialiased" }}>
          <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

          {/* Header */}
          <div style={{ padding: "24px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", 
              position: "sticky", top: 0, zIndex: 50, background: "rgba(10, 10, 11, 0.8)", backdropFilter: "blur(12px)" }}>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, fontFamily: "'Outfit',sans-serif", letterSpacing: -0.5 }}>
                Scheda Allenamento
              </h1>
              <p style={{ fontSize: 13, color: "#8B8B8E", margin: "4px 0 0" }}>Apr → Giu 2026 · 3×/sett.</p>
            </div>
            {tab !== "tips" && (
              <button onClick={resetDay} style={{ fontSize: 12, fontWeight: 600, color: "#8B8B8E", background: "#161618", border: "1px solid #222",
                borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontFamily: "'Outfit',sans-serif", transition: "all 0.2s" }}>
                Azzera Scheda
              </button>
            )}
          </div>

          {/* Objective pills */}
          <div style={{ display: "flex", gap: 8, padding: "0 20px 16px", overflowX: "auto" }}>
            {[["🎯 Postura", "#3B82F6"], ["❤️ Cardio", "#10B981"], ["🥾 Cammino", "#F59E0B"]].map(([l, c]) => (
              <span key={l} style={{ flexShrink: 0, padding: "6px 14px", borderRadius: 20, fontSize: 12,
                fontWeight: 700, background: `${c}1A`, color: c, letterSpacing: 0.3, border: `1px solid ${c}33` }}>{l}</span>
            ))}
          </div>

          {/* Content */}
          {tab === "tips" ? <TipsView /> : <DayView dayKey={tab} completions={completions} setCompletions={setCompletions} />}

          {/* Bottom Nav */}
          <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: 500, background: "rgba(10, 10, 11, 0.9)", borderTop: "1px solid #1A1A1E",
            display: "flex", justifyContent: "space-around", padding: "10px 0 max(10px, env(safe-area-inset-bottom))",
            zIndex: 100, backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)" }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  background: "none", border: "none", cursor: "pointer", padding: "6px 0",
                  WebkitTapHighlightColor: "transparent" }}>
                <div style={{
                  width: 40, height: 40, borderRadius: 12,
                  background: tab === t.key ? t.color : "transparent",
                  border: tab === t.key ? "none" : "1px solid #222225",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "'Outfit',monospace", fontWeight: 700, fontSize: t.label.length > 1 ? 18 : 16,
                  color: tab === t.key ? "#fff" : "#666", transition: "all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
                  transform: tab === t.key ? "scale(1.1)" : "scale(1)"
                }}>{t.label}</div>
                {t.key !== "tips" && t.key !== "H" && (
                  <span style={{ fontSize: 10, color: tab === t.key ? t.color : "#555", fontWeight: 700, textTransform: "uppercase" }}>
                    {t.key === "A" ? "Upper" : t.key === "B" ? "Lower" : "Circuit"}
                  </span>
                )}
              </button>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
